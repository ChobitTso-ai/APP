<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>案例標記工具 v1.1</title>
<style>
  :root{
    --accent:#1273cc; --accent-dark:#0d5aa3;
    --ink:#1d2733; --ink-2:#5a6b7d;
    --bg:#eef2f6; --card:#ffffff; --line:#d8e0e8;
    --red:#e53935; --blue:#1e88e5; --yellow:#f2b90d;
    --radius:12px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    display:flex; flex-direction:column; height:100vh; height:100dvh; overflow:hidden;
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
  }
  input{-webkit-user-select:text; user-select:text;}
  button{touch-action:manipulation;}
  /* ── 頂列 ── */
  header{
    background:var(--card); border-bottom:1px solid var(--line);
    padding:calc(8px + env(safe-area-inset-top)) 14px 8px 14px;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap; flex-shrink:0;
  }
  .brand{display:flex; align-items:baseline; gap:8px;}
  .brand h1{font-size:17px; margin:0; letter-spacing:.5px;}
  .ver{font-size:11px; color:#fff; background:var(--accent); border-radius:20px; padding:2px 8px;}
  nav{display:flex; background:var(--bg); border-radius:22px; padding:3px; margin-left:auto;}
  nav button{
    border:0; background:transparent; color:var(--ink-2); font-size:14px; font-weight:600;
    padding:8px 16px; border-radius:19px; min-height:38px; cursor:pointer;
  }
  nav button.on{background:var(--accent); color:#fff;}
  /* ── 主區 ── */
  main{flex:1; min-height:0; display:flex; flex-direction:column;}
  .view{flex:1; min-height:0; display:none; flex-direction:column;}
  .view.on{display:flex;}
  .hint{color:var(--ink-2); text-align:center; margin:40px 16px; font-size:15px; line-height:1.8;}
  /* ── 照片庫 ── */
  .lib-bar{padding:12px 14px 4px; display:flex; gap:10px; align-items:center;}
  .grid-thumbs{
    flex:1; overflow-y:auto; padding:10px 14px calc(20px + env(safe-area-inset-bottom));
    display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; align-content:start;
  }
  .thumb{
    position:relative; background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    overflow:hidden; cursor:pointer;
  }
  .thumb img{width:100%; aspect-ratio:4/3; object-fit:cover; display:block; background:#20242a;}
  .thumb .nm{font-size:11px; color:var(--ink-2); padding:6px 8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .thumb .mk{position:absolute; left:6px; top:6px; background:rgba(18,115,204,.9); color:#fff; font-size:11px; border-radius:12px; padding:2px 8px;}
  .thumb .del{
    position:absolute; right:6px; top:6px; width:28px; height:28px; border-radius:50%;
    border:0; background:rgba(20,23,28,.65); color:#fff; font-size:14px; cursor:pointer;
  }
  .thumb .ord{
    position:absolute; right:8px; top:8px; width:30px; height:30px; border-radius:50%;
    background:var(--accent); color:#fff; font-size:15px; font-weight:700;
    display:flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,.35);
  }
  .thumb.sel{outline:3px solid var(--accent);}
  /* ── 按鈕 ── */
  .btn{
    border:1px solid var(--line); background:var(--card); color:var(--ink);
    font-size:14px; font-weight:600; padding:10px 16px; border-radius:22px; min-height:44px; cursor:pointer;
    display:inline-flex; align-items:center; gap:7px;
  }
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
  .btn.on{background:var(--ink); border-color:var(--ink); color:#fff;}
  .btn:disabled{opacity:.45;}
  .dot{width:13px; height:13px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 1px rgba(0,0,0,.15);}
  /* ── 標記編輯 ── */
  .toolbar{
    display:flex; gap:8px; padding:10px 14px 6px; overflow-x:auto; flex-shrink:0;
    -webkit-overflow-scrolling:touch;
  }
  .toolbar::-webkit-scrollbar{display:none;}
  .canvas-wrap{flex:1; min-height:0; margin:4px 14px; position:relative; background:#14171c; border-radius:var(--radius); overflow:hidden;}
  #edCanvas{position:absolute; inset:0; width:100%; height:100%; touch-action:none;}
  .float-bar{
    position:absolute; left:50%; transform:translateX(-50%); bottom:14px;
    display:none; gap:8px; background:rgba(255,255,255,.96); border:1px solid var(--line);
    border-radius:26px; padding:6px; box-shadow:0 4px 16px rgba(0,0,0,.25);
  }
  .float-bar.on{display:flex;}
  .ed-foot{
    display:flex; align-items:center; gap:10px; padding:8px 14px calc(10px + env(safe-area-inset-bottom));
    flex-shrink:0;
  }
  .ed-foot .nm{flex:1; text-align:center; font-size:13px; color:var(--ink-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  /* ── 組圖 ── */
  .col-scroll{flex:1; overflow-y:auto; padding-bottom:calc(16px + env(safe-area-inset-bottom));}
  .sec-t{font-size:13px; font-weight:700; color:var(--ink-2); margin:14px 16px 8px; letter-spacing:1px;}
  .grid-thumbs.pick{flex:none; overflow:visible; padding-top:0;}
  .sel-list{display:flex; flex-direction:column; gap:10px; padding:0 14px;}
  .sel-row{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:10px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  }
  .sel-row img{width:74px; height:56px; object-fit:cover; border-radius:8px; background:#20242a;}
  .sel-row .no{font-weight:800; color:var(--accent); font-size:16px; width:22px; text-align:center;}
  .sel-row input{
    flex:1; min-width:120px; border:1px solid var(--line); border-radius:10px;
    padding:10px 12px; font-size:15px; min-height:42px;
  }
  .tags{display:flex; gap:6px; flex-wrap:wrap;}
  .tag{
    border:1px solid var(--line); background:var(--bg); border-radius:16px; font-size:13px;
    padding:7px 12px; cursor:pointer; min-height:36px;
  }
  .tag.on{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700;}
  .col-act{padding:14px; display:flex; gap:10px;}
  /* ── 匯出視窗 ── */
  .modal{
    position:fixed; inset:0; background:rgba(10,14,18,.72); display:none;
    align-items:center; justify-content:center; z-index:50; padding:18px;
  }
  .modal.on{display:flex;}
  .modal .box{
    background:var(--card); border-radius:16px; max-width:820px; width:100%; max-height:92dvh;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .modal .box .img-area{flex:1; min-height:0; overflow:auto; background:#14171c; text-align:center;}
  .modal .box img{max-width:100%; height:auto; display:block; margin:0 auto;}
  .modal .box .m-foot{padding:12px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .modal .tip{font-size:12px; color:var(--ink-2); width:100%;}
  footer{
    flex-shrink:0; text-align:center; font-size:10.5px; color:#93a1af;
    padding:3px 8px calc(3px + env(safe-area-inset-bottom)); background:var(--bg);
  }
</style>
</head>
<body>

<header>
  <div class="brand"><h1>案例標記工具</h1><span class="ver">v1.1</span></div>
  <nav>
    <button id="tabLib" class="on">照片庫</button>
    <button id="tabEdit">標記</button>
    <button id="tabGrid">組圖</button>
  </nav>
</header>

<main>
  <!-- 照片庫 -->
  <section id="vLib" class="view on">
    <div class="lib-bar">
      <button class="btn primary" id="btnAdd">＋ 加入照片</button>
      <input type="file" id="fileIn" accept="image/*" multiple hidden>
      <span style="font-size:13px;color:var(--ink-2)" id="libCount"></span>
    </div>
    <div class="grid-thumbs" id="libGrid"></div>
    <div class="hint" id="libHint">尚未加入照片<br>點「＋ 加入照片」從相簿或檔案選取，<br>加入後點縮圖即可開始標記。</div>
  </section>

  <!-- 標記編輯 -->
  <section id="vEdit" class="view">
    <div class="toolbar">
      <button class="btn tool" data-mode="red"><span class="dot" style="background:var(--red)"></span>需處理</button>
      <button class="btn tool" data-mode="blue"><span class="dot" style="background:var(--blue)"></span>觀察</button>
      <button class="btn tool" data-mode="yellow"><span class="dot" style="background:var(--yellow)"></span>自訂</button>
      <button class="btn tool" data-mode="select">✥ 移動</button>
      <button class="btn tool" data-mode="crop">⬚ 裁切</button>
      <button class="btn" id="btnRotL">↺</button>
      <button class="btn" id="btnRotR">↻</button>
      <button class="btn primary" id="btnExport">匯出</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="edCanvas"></canvas>
      <div class="float-bar" id="markerBar">
        <button class="btn" id="btnEditTxt">✎ 編輯文字</button>
        <button class="btn" id="btnDelMk" style="color:var(--red)">🗑 刪除</button>
        <button class="btn" id="btnDeselect">完成</button>
      </div>
      <div class="float-bar" id="cropBar">
        <button class="btn primary" id="btnCropOk">✓ 套用裁切</button>
        <button class="btn" id="btnCropNo">取消</button>
      </div>
    </div>
    <div class="ed-foot">
      <button class="btn" id="btnPrev">‹ 上一張</button>
      <div class="nm" id="edName"></div>
      <button class="btn" id="btnNext">下一張 ›</button>
    </div>
  </section>

  <!-- 組圖 -->
  <section id="vGrid" class="view">
    <div class="col-scroll">
      <div class="sec-t">① 依順序點選照片（最多 8 張，含已完成的標記）</div>
      <div class="grid-thumbs pick" id="pickGrid"></div>
      <div class="hint" id="pickHint" style="margin:20px 16px">請先在「照片庫」加入照片</div>
      <div class="sec-t" id="selTitle" style="display:none">② 每格標題（選填）</div>
      <div class="sel-list" id="selList"></div>
      <div class="sec-t">③ 版面格式</div>
      <div class="tags" style="padding:0 16px">
        <button class="tag fmt on" data-fmt="std">標準組圖（白底網格）</button>
        <button class="tag fmt" data-fmt="story">FB／IG 限時動態（9:16 直式）</button>
      </div>
      <div class="col-act">
        <button class="btn primary" id="btnBuild" disabled>產生組圖</button>
        <button class="btn" id="btnClearSel">清除選取</button>
      </div>
    </div>
  </section>
</main>

<footer>案例標記工具 v1.1　©Tso KY - All Rights Reserved · Protected against reverse engineering and unauthorized modification</footer>

<!-- 匯出預覽 -->
<div class="modal" id="expModal">
  <div class="box">
    <div class="img-area"><img id="expImg" alt="匯出預覽"></div>
    <div class="m-foot">
      <button class="btn primary" id="btnShare">分享／儲存到相簿</button>
      <button class="btn" id="btnDownload">下載檔案</button>
      <button class="btn" id="btnCloseExp">關閉</button>
      <div class="tip">iPad／iPhone：點「分享／儲存到相簿」後選「儲存影像」；也可直接長按預覽圖儲存。</div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   案例標記工具 v1.1
   Tso KY - All Rights Reserved
   Protected against reverse engineering and unauthorized modification
   ============================================================ */
"use strict";

var COLORS = { red:"#e53935", blue:"#1e88e5", yellow:"#f2b90d" };
var PRESET = { red:"需處理", blue:"觀察" };
var MAX_COLLAGE = 8;

var state = {
  photos: [],          // {id,name,bmp,markers[],thumb,dirty}
  curId: null,
  mode: "red",         // red|blue|yellow|select|crop
  selMk: -1,
  crop: null,          // {x,y,w,h} normalized
  colSel: [],          // photo id 依點選順序
  colTitle: {},        // id -> title
  colFormat: "std"     // std｜story（FB/IG 限時動態 9:16）
};
var seq = 1;

function $(id){ return document.getElementById(id); }
function bw(b){ return b.naturalWidth || b.width; }
function bh(b){ return b.naturalHeight || b.height; }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function photoById(id){ for(var i=0;i<state.photos.length;i++){ if(state.photos[i].id===id) return state.photos[i]; } return null; }
function cur(){ return photoById(state.curId); }

/* ───────── 分頁切換 ───────── */
var views = { lib:$("vLib"), edit:$("vEdit"), grid:$("vGrid") };
var tabs  = { lib:$("tabLib"), edit:$("tabEdit"), grid:$("tabGrid") };
function show(v){
  for(var k in views){
    views[k].classList.toggle("on", k===v);
    tabs[k].classList.toggle("on", k===v);
  }
  if(v==="lib") renderLib();
  if(v==="grid") renderCollage();
  if(v==="edit"){ requestAnimationFrame(draw); }
}
tabs.lib.onclick  = function(){ show("lib"); };
tabs.grid.onclick = function(){ show("grid"); };
tabs.edit.onclick = function(){
  if(!state.curId && state.photos.length) state.curId = state.photos[0].id;
  show("edit");
};

/* ───────── 載入照片 ───────── */
$("btnAdd").onclick = function(){ $("fileIn").click(); };
$("fileIn").onchange = function(e){
  var files = Array.prototype.slice.call(e.target.files);
  files.forEach(function(f){
    var rd = new FileReader();
    rd.onload = function(){
      var img = new Image();
      img.onerror = function(){
        alert("無法讀取「"+f.name+"」，此瀏覽器可能不支援該格式（如 HEIC），請先轉成 JPG／PNG。");
      };
      img.onload = function(){
        state.photos.push({
          id:"p"+(seq++),
          name:(f.name||"照片").replace(/\.[^.]+$/,""),
          bmp:img, markers:[], thumb:null, dirty:true
        });
        renderLib();
      };
      img.src = rd.result;
    };
    rd.readAsDataURL(f);
  });
  e.target.value = "";
};

/* ───────── 縮圖（含標記） ───────── */
function makeThumb(p){
  if(p.thumb && !p.dirty) return p.thumb;
  var W = bw(p.bmp), H = bh(p.bmp);
  var tw = 380, th = Math.round(tw*H/W);
  var c = document.createElement("canvas"); c.width = tw; c.height = th;
  drawAnnotated(c.getContext("2d"), p.bmp, p.markers, 0,0,tw,th, -1, null);
  p.thumb = c.toDataURL("image/jpeg", 0.8);
  p.dirty = false;
  return p.thumb;
}

/* ───────── 照片庫畫面 ───────── */
function renderLib(){
  var g = $("libGrid"); g.innerHTML = "";
  $("libHint").style.display = state.photos.length ? "none" : "block";
  $("libCount").textContent = state.photos.length ? "共 "+state.photos.length+" 張" : "";
  state.photos.forEach(function(p){
    var d = document.createElement("div"); d.className = "thumb";
    var im = document.createElement("img"); im.src = makeThumb(p); d.appendChild(im);
    if(p.markers.length){
      var mk = document.createElement("div"); mk.className = "mk";
      mk.textContent = p.markers.length + " 標記"; d.appendChild(mk);
    }
    var del = document.createElement("button"); del.className = "del"; del.textContent = "✕";
    del.onclick = function(ev){
      ev.stopPropagation();
      if(!confirm("刪除照片「"+p.name+"」？")) return;
      state.photos = state.photos.filter(function(q){ return q.id!==p.id; });
      state.colSel = state.colSel.filter(function(id){ return id!==p.id; });
      if(state.curId===p.id) state.curId = state.photos.length ? state.photos[0].id : null;
      renderLib();
    };
    d.appendChild(del);
    var nm = document.createElement("div"); nm.className = "nm"; nm.textContent = p.name; d.appendChild(nm);
    d.onclick = function(){ state.curId = p.id; state.selMk = -1; exitCrop(); show("edit"); };
    g.appendChild(d);
  });
}

/* ───────── 標記／匯出共用繪製 ─────────
   markers 座標一律為 0~1 正規化（相對目前影像）
   u = w/1000：所有尺寸以千分比縮放，螢幕與匯出一致 */
function drawAnnotated(ctx, bmp, markers, x0, y0, w, h, selIdx, boxesOut){
  ctx.fillStyle="#ffffff"; ctx.fillRect(x0, y0, w, h);   // 透明 PNG 轉 JPEG 防黑底
  ctx.drawImage(bmp, x0, y0, w, h);
  var u = w/1000;
  var font = "bold " + (27*u) + "px -apple-system,'PingFang TC','Microsoft JhengHei',sans-serif";
  // 引線
  markers.forEach(function(m){
    var dx=x0+m.x*w, dy=y0+m.y*h, lx=x0+m.lx*w, ly=y0+m.ly*h;
    ctx.save();
    ctx.strokeStyle="#ffffff"; ctx.lineWidth=2.4*u;
    ctx.shadowColor="rgba(0,0,0,.45)"; ctx.shadowBlur=3*u;
    ctx.beginPath(); ctx.moveTo(dx,dy); ctx.lineTo(lx,ly); ctx.stroke();
    ctx.restore();
  });
  // 圓點
  markers.forEach(function(m,i){
    var dx=x0+m.x*w, dy=y0+m.y*h;
    ctx.save();
    ctx.shadowColor="rgba(0,0,0,.4)"; ctx.shadowBlur=3*u;
    ctx.beginPath(); ctx.arc(dx,dy,11*u,0,Math.PI*2);
    ctx.fillStyle=m.color; ctx.fill();
    ctx.lineWidth=3*u; ctx.strokeStyle="#ffffff"; ctx.stroke();
    ctx.restore();
    if(i===selIdx){
      ctx.save();
      ctx.beginPath(); ctx.arc(dx,dy,17*u,0,Math.PI*2);
      ctx.setLineDash([5*u,4*u]); ctx.lineWidth=2.2*u; ctx.strokeStyle="#1273cc"; ctx.stroke();
      ctx.restore();
    }
    if(boxesOut) boxesOut.dots.push({x:dx,y:dy,r:11*u});
  });
  // 標籤框
  ctx.font = font;
  markers.forEach(function(m,i){
    var lx=x0+m.lx*w, ly=y0+m.ly*h;
    var tw = ctx.measureText(m.text).width;
    var padX=13*u, padY=9*u;
    var bwd=tw+padX*2, bht=27*u+padY*2;
    var bx=lx-bwd/2, by=ly-bht/2;
    ctx.save();
    ctx.shadowColor="rgba(0,0,0,.35)"; ctx.shadowBlur=4*u;
    roundRect(ctx,bx,by,bwd,bht,8*u);
    ctx.fillStyle="rgba(248,249,251,0.94)"; ctx.fill();
    ctx.restore();
    ctx.save();
    roundRect(ctx,bx,by,bwd,bht,8*u);
    ctx.lineWidth = (i===selIdx?3:1.4)*u;
    ctx.strokeStyle = (i===selIdx? "#1273cc" : "rgba(90,100,110,.55)");
    ctx.stroke();
    ctx.fillStyle="#2b2f33"; ctx.font=font; ctx.textBaseline="middle"; ctx.textAlign="center";
    ctx.fillText(m.text, lx, ly+1*u);
    ctx.restore();
    if(boxesOut) boxesOut.labels.push({x:bx,y:by,w:bwd,h:bht});
  });
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

/* ───────── 編輯畫布 ───────── */
var cv = $("edCanvas"), cx = cv.getContext("2d");
var geo = {offX:0, offY:0, w:0, h:0};       // 影像在畫布中的位置（CSS px）
var hits = {dots:[], labels:[]};            // 供命中測試

function layout(){
  var wrap = cv.parentElement;
  var dpr = window.devicePixelRatio || 1;
  var W = wrap.clientWidth, H = wrap.clientHeight;
  cv.width = Math.round(W*dpr); cv.height = Math.round(H*dpr);
  cx.setTransform(dpr,0,0,dpr,0,0);
  var p = cur();
  if(p){
    var s = Math.min(W/bw(p.bmp), H/bh(p.bmp)) * 0.97;
    geo.w = bw(p.bmp)*s; geo.h = bh(p.bmp)*s;
    geo.offX = (W-geo.w)/2; geo.offY = (H-geo.h)/2;
  }
  return {W:W, H:H};
}
function draw(){
  var sz = layout();
  cx.clearRect(0,0,sz.W,sz.H);
  var p = cur();
  $("edName").textContent = p ? p.name : "";
  updateToolUI();
  if(!p){
    cx.fillStyle="#8b98a5"; cx.font="15px sans-serif"; cx.textAlign="center";
    cx.fillText("請先在「照片庫」加入並選擇照片", sz.W/2, sz.H/2);
    return;
  }
  hits = {dots:[], labels:[]};
  drawAnnotated(cx, p.bmp, p.markers, geo.offX, geo.offY, geo.w, geo.h, state.selMk, hits);
  if(state.mode==="crop" && state.crop) drawCrop(sz);
}
function drawCrop(sz){
  var r = cropCss();
  cx.save();
  cx.fillStyle="rgba(8,10,14,.55)";
  cx.beginPath();
  cx.rect(0,0,sz.W,sz.H);
  cx.rect(r.x, r.y, r.w, r.h);
  cx.fill("evenodd");
  cx.strokeStyle="#ffffff"; cx.lineWidth=2;
  cx.strokeRect(r.x, r.y, r.w, r.h);
  cropCorners(r).forEach(function(c){
    cx.fillStyle="#1273cc";
    cx.fillRect(c.x-9, c.y-9, 18, 18);
    cx.strokeStyle="#fff"; cx.lineWidth=2;
    cx.strokeRect(c.x-9, c.y-9, 18, 18);
  });
  cx.restore();
}
function cropCss(){
  var c = state.crop;
  return { x:geo.offX+c.x*geo.w, y:geo.offY+c.y*geo.h, w:c.w*geo.w, h:c.h*geo.h };
}
function cropCorners(r){
  return [
    {k:"tl", x:r.x,     y:r.y},
    {k:"tr", x:r.x+r.w, y:r.y},
    {k:"bl", x:r.x,     y:r.y+r.h},
    {k:"br", x:r.x+r.w, y:r.y+r.h}
  ];
}

/* ───────── 指標事件（觸控＋滑鼠） ───────── */
var drag = null;
cv.addEventListener("pointerdown", function(e){
  var p = cur(); if(!p) return;
  cv.setPointerCapture(e.pointerId);
  var pt = evPt(e);

  if(state.mode==="crop" && state.crop){
    var r = cropCss(), hitC = null;
    cropCorners(r).forEach(function(c){
      if(Math.abs(pt.x-c.x)<20 && Math.abs(pt.y-c.y)<20) hitC = c.k;
    });
    if(hitC){ drag = {type:"crop-corner", corner:hitC}; return; }
    if(pt.x>r.x && pt.x<r.x+r.w && pt.y>r.y && pt.y<r.y+r.h){
      drag = {type:"crop-move", sx:pt.x, sy:pt.y, c0:Object.assign({},state.crop)};
    }
    return;
  }

  // 先命中測試：標籤 > 圓點
  for(var i=p.markers.length-1; i>=0; i--){
    var b = hits.labels[i];
    if(b && pt.x>=b.x && pt.x<=b.x+b.w && pt.y>=b.y && pt.y<=b.y+b.h){
      state.selMk = i; drag = {type:"label", idx:i}; draw(); return;
    }
  }
  for(var j=p.markers.length-1; j>=0; j--){
    var d = hits.dots[j];
    if(d && Math.hypot(pt.x-d.x, pt.y-d.y) <= d.r+12){
      state.selMk = j; drag = {type:"dot", idx:j}; draw(); return;
    }
  }
  // 空白處
  if(state.mode==="red" || state.mode==="blue" || state.mode==="yellow"){
    var n = toNorm(pt);
    if(n) addMarker(n.x, n.y);
  }else{
    state.selMk = -1; draw();
  }
});
cv.addEventListener("pointermove", function(e){
  if(!drag) return;
  var p = cur(); if(!p) return;
  var pt = evPt(e);

  if(drag.type==="dot" || drag.type==="label"){
    var n = toNorm(pt, true);
    var m = p.markers[drag.idx];
    if(drag.type==="dot"){ m.x=n.x; m.y=n.y; } else { m.lx=n.x; m.ly=n.y; }
    p.dirty = true; draw();
  }
  else if(drag.type==="crop-move"){
    var c = state.crop, dx=(pt.x-drag.sx)/geo.w, dy=(pt.y-drag.sy)/geo.h;
    c.x = clamp(drag.c0.x+dx, 0, 1-c.w);
    c.y = clamp(drag.c0.y+dy, 0, 1-c.h);
    draw();
  }
  else if(drag.type==="crop-corner"){
    var n2 = toNorm(pt, true), c2 = state.crop, MIN=0.06;
    var x2=c2.x+c2.w, y2=c2.y+c2.h;
    if(drag.corner==="tl"){ c2.x=clamp(n2.x,0,x2-MIN); c2.y=clamp(n2.y,0,y2-MIN); c2.w=x2-c2.x; c2.h=y2-c2.y; }
    if(drag.corner==="tr"){ c2.y=clamp(n2.y,0,y2-MIN); c2.w=clamp(n2.x,c2.x+MIN,1)-c2.x; c2.h=y2-c2.y; }
    if(drag.corner==="bl"){ c2.x=clamp(n2.x,0,x2-MIN); c2.w=x2-c2.x; c2.h=clamp(n2.y,c2.y+MIN,1)-c2.y; }
    if(drag.corner==="br"){ c2.w=clamp(n2.x,c2.x+MIN,1)-c2.x; c2.h=clamp(n2.y,c2.y+MIN,1)-c2.y; }
    draw();
  }
});
cv.addEventListener("pointerup", function(){ drag = null; });
cv.addEventListener("pointercancel", function(){ drag = null; });

function evPt(e){
  var r = cv.getBoundingClientRect();
  return { x:e.clientX-r.left, y:e.clientY-r.top };
}
function toNorm(pt, allowClamp){
  var nx=(pt.x-geo.offX)/geo.w, ny=(pt.y-geo.offY)/geo.h;
  if(allowClamp) return { x:clamp(nx,0,1), y:clamp(ny,0,1) };
  if(nx<0||nx>1||ny<0||ny>1) return null;
  return { x:nx, y:ny };
}

/* ───────── 標記操作 ───────── */
function addMarker(nx, ny){
  var p = cur();
  var text;
  if(state.mode==="yellow"){
    text = (prompt("標籤文字","") || "").trim();
    if(!text) return;
  }else{
    text = PRESET[state.mode];
  }
  var lx = clamp(nx + (nx<0.5? 0.17 : -0.17), 0.07, 0.93);
  var ly = clamp(ny - 0.16, 0.07, 0.93);
  p.markers.push({ x:nx, y:ny, lx:lx, ly:ly, text:text, color:COLORS[state.mode] });
  state.selMk = p.markers.length-1;
  p.dirty = true;
  draw();
}
$("btnEditTxt").onclick = function(){
  var p = cur(); if(!p || state.selMk<0) return;
  var m = p.markers[state.selMk];
  var t = prompt("標籤文字", m.text);
  if(t!==null && t.trim()){ m.text = t.trim(); p.dirty=true; draw(); }
};
$("btnDelMk").onclick = function(){
  var p = cur(); if(!p || state.selMk<0) return;
  p.markers.splice(state.selMk,1);
  state.selMk = -1; p.dirty = true;
  draw();
};
$("btnDeselect").onclick = function(){ state.selMk = -1; draw(); };

/* ───────── 工具列 ───────── */
Array.prototype.forEach.call(document.querySelectorAll(".tool"), function(b){
  b.onclick = function(){
    var md = b.getAttribute("data-mode");
    if(md==="crop"){
      if(state.mode==="crop"){ exitCrop(); draw(); return; }
      if(!cur()) return;
      state.mode = "crop";
      state.crop = { x:0.05, y:0.05, w:0.9, h:0.9 };
      state.selMk = -1;
    }else{
      exitCrop();
      state.mode = md;
    }
    draw();
  };
});
function exitCrop(){
  if(state.mode==="crop"){ state.mode = "select"; }
  state.crop = null;
}
function updateToolUI(){
  Array.prototype.forEach.call(document.querySelectorAll(".tool"), function(b){
    b.classList.toggle("on", b.getAttribute("data-mode")===state.mode);
  });
  $("cropBar").classList.toggle("on", state.mode==="crop" && !!state.crop);
  $("markerBar").classList.toggle("on", state.mode!=="crop" && state.selMk>=0);
}
$("btnCropNo").onclick = function(){ exitCrop(); draw(); };
$("btnCropOk").onclick = function(){
  var p = cur(); if(!p || !state.crop) return;
  var c = state.crop;
  var W = bw(p.bmp), H = bh(p.bmp);
  var sw = Math.round(c.w*W), sh = Math.round(c.h*H);
  var nc = document.createElement("canvas"); nc.width = sw; nc.height = sh;
  nc.getContext("2d").drawImage(p.bmp, c.x*W, c.y*H, c.w*W, c.h*H, 0, 0, sw, sh);
  p.bmp = nc;
  p.markers = p.markers
    .filter(function(m){ return m.x>=c.x && m.x<=c.x+c.w && m.y>=c.y && m.y<=c.y+c.h; })
    .map(function(m){
      return {
        x:(m.x-c.x)/c.w, y:(m.y-c.y)/c.h,
        lx:clamp((m.lx-c.x)/c.w, 0.05, 0.95),
        ly:clamp((m.ly-c.y)/c.h, 0.05, 0.95),
        text:m.text, color:m.color
      };
    });
  state.selMk = -1; p.dirty = true;
  exitCrop(); draw();
};

/* ───────── 旋轉 ───────── */
function rotate(cw){
  var p = cur(); if(!p) return;
  exitCrop();
  var W = bw(p.bmp), H = bh(p.bmp);
  var nc = document.createElement("canvas"); nc.width = H; nc.height = W;
  var g = nc.getContext("2d");
  if(cw){ g.translate(H,0); g.rotate(Math.PI/2); }
  else  { g.translate(0,W); g.rotate(-Math.PI/2); }
  g.drawImage(p.bmp, 0, 0);
  p.bmp = nc;
  p.markers.forEach(function(m){
    var a, b;
    if(cw){ a=1-m.y; b=m.x;  m.x=a; m.y=b; a=1-m.ly; b=m.lx; m.lx=a; m.ly=b; }
    else  { a=m.y;  b=1-m.x; m.x=a; m.y=b; a=m.ly;  b=1-m.lx; m.lx=a; m.ly=b; }
  });
  p.dirty = true;
  draw();
}
$("btnRotR").onclick = function(){ rotate(true); };
$("btnRotL").onclick = function(){ rotate(false); };

/* ───────── 上一張／下一張 ───────── */
function step(d){
  if(!state.photos.length) return;
  var i = state.photos.findIndex(function(q){ return q.id===state.curId; });
  i = (i + d + state.photos.length) % state.photos.length;
  state.curId = state.photos[i].id;
  state.selMk = -1; exitCrop(); draw();
}
$("btnPrev").onclick = function(){ step(-1); };
$("btnNext").onclick = function(){ step(1); };

/* ───────── 匯出單張 ───────── */
$("btnExport").onclick = function(){
  var p = cur(); if(!p) return;
  var W = bw(p.bmp), H = bh(p.bmp);
  var c = document.createElement("canvas"); c.width = W; c.height = H;
  drawAnnotated(c.getContext("2d"), p.bmp, p.markers, 0, 0, W, H, -1, null);
  openExport(c, p.name + "_標記.jpg");
};

/* ───────── 組圖 ───────── */
var TAGS = ["Before","After","術中","術後"];
function renderCollage(){
  var g = $("pickGrid"); g.innerHTML = "";
  $("pickHint").style.display = state.photos.length ? "none" : "block";
  state.photos.forEach(function(p){
    var d = document.createElement("div"); d.className = "thumb";
    var idx = state.colSel.indexOf(p.id);
    if(idx>=0) d.classList.add("sel");
    var im = document.createElement("img"); im.src = makeThumb(p); d.appendChild(im);
    if(idx>=0){
      var o = document.createElement("div"); o.className = "ord"; o.textContent = idx+1; d.appendChild(o);
    }
    var nm = document.createElement("div"); nm.className = "nm"; nm.textContent = p.name; d.appendChild(nm);
    d.onclick = function(){
      var k = state.colSel.indexOf(p.id);
      if(k>=0){ state.colSel.splice(k,1); }
      else{
        if(state.colSel.length>=MAX_COLLAGE){ alert("最多選 "+MAX_COLLAGE+" 張"); return; }
        state.colSel.push(p.id);
      }
      renderCollage();
    };
    g.appendChild(d);
  });
  // 已選清單
  var list = $("selList"); list.innerHTML = "";
  $("selTitle").style.display = state.colSel.length ? "block" : "none";
  $("btnBuild").disabled = state.colSel.length < 2;
  state.colSel.forEach(function(id, i){
    var p = photoById(id); if(!p) return;
    var row = document.createElement("div"); row.className = "sel-row";
    var no = document.createElement("div"); no.className = "no"; no.textContent = i+1; row.appendChild(no);
    var im = document.createElement("img"); im.src = makeThumb(p); row.appendChild(im);
    var inp = document.createElement("input");
    inp.placeholder = "此格標題（例：Before）";
    inp.value = state.colTitle[id] || "";
    inp.oninput = function(){ state.colTitle[id] = inp.value; };
    row.appendChild(inp);
    var tg = document.createElement("div"); tg.className = "tags";
    TAGS.forEach(function(t){
      var b = document.createElement("button"); b.className = "tag"; b.textContent = t;
      b.onclick = function(){ state.colTitle[id] = t; inp.value = t; };
      tg.appendChild(b);
    });
    row.appendChild(tg);
    list.appendChild(row);
  });
}
$("btnClearSel").onclick = function(){ state.colSel = []; renderCollage(); };
Array.prototype.forEach.call(document.querySelectorAll(".fmt"), function(b){
  b.onclick = function(){
    state.colFormat = b.getAttribute("data-fmt");
    Array.prototype.forEach.call(document.querySelectorAll(".fmt"), function(q){
      q.classList.toggle("on", q===b);
    });
  };
});
$("btnBuild").onclick = function(){
  var ids = state.colSel, n = ids.length;
  if(n<2){ alert("請至少選擇 2 張照片"); return; }
  var story = (state.colFormat==="story");
  var cols = story ? ((n<=3)? 1 : 2) : 2;
  var rows = Math.ceil(n/cols);
  var c = document.createElement("canvas");
  var GAP, padX, padT, padB, CW, CH;
  if(story){
    // FB／IG 限時動態：1080×1920，上下預留安全區避開介面遮蔽
    c.width = 1080; c.height = 1920;
    GAP = 24; padX = 30; padT = 160; padB = 160;
    CW = (c.width  - padX*2 - (cols-1)*GAP) / cols;
    CH = (c.height - padT - padB - (rows-1)*GAP) / rows;
  }else{
    CW = 1200; CH = 900; GAP = 20; padX = GAP; padT = GAP; padB = GAP;
    c.width  = cols*CW + (cols-1)*GAP + padX*2;
    c.height = rows*CH + (rows-1)*GAP + padT + padB;
  }
  var g = c.getContext("2d");
  g.fillStyle = "#ffffff"; g.fillRect(0,0,c.width,c.height);
  for(var i=0; i<rows*cols; i++){
    var r = Math.floor(i/cols), col = i%cols;
    var x = padX + col*(CW+GAP), y = padT + r*(CH+GAP);
    if(i<n){
      drawCell(g, photoById(ids[i]), x, y, CW, CH, (state.colTitle[ids[i]]||"").trim());
    }else{
      g.fillStyle = "#eef1f4"; g.fillRect(x, y, CW, CH);
    }
  }
  var d = new Date();
  var stamp = d.getFullYear() + p2(d.getMonth()+1) + p2(d.getDate()) + "_" + p2(d.getHours()) + p2(d.getMinutes());
  openExport(c, (story? "限時動態_" : "案例組圖_") + stamp + ".jpg");
};
/* 單格繪製：含標記全解析渲染 → cover 置入 → 角落標題（字級隨格寬縮放） */
function drawCell(g, p, x, y, cw, ch, title){
  if(!p) return;
  var W = bw(p.bmp), H = bh(p.bmp);
  var t = document.createElement("canvas"); t.width = W; t.height = H;
  drawAnnotated(t.getContext("2d"), p.bmp, p.markers, 0, 0, W, H, -1, null);
  var s = Math.max(cw/W, ch/H);
  var sw = cw/s, sh = ch/s, sx = (W-sw)/2, sy = (H-sh)/2;
  g.drawImage(t, sx, sy, sw, sh, x, y, cw, ch);
  if(title){
    var fs = clamp(Math.round(cw*0.042), 26, 50);
    g.font = "bold " + fs + "px -apple-system,'PingFang TC','Microsoft JhengHei',sans-serif";
    var tw = g.measureText(title).width;
    var padx = Math.round(fs*0.6), bh2 = Math.round(fs*1.7), m = Math.round(cw*0.022);
    roundRect(g, x+m, y+m, tw+padx*2, bh2, Math.round(fs*0.3));
    g.fillStyle = "rgba(45,48,54,.78)"; g.fill();
    g.fillStyle = "#ffffff"; g.textBaseline = "middle"; g.textAlign = "left";
    g.fillText(title, x+m+padx, y+m+bh2/2+1);
  }
}
function p2(n){ return (n<10?"0":"")+n; }

/* ───────── 匯出視窗（分享／下載） ───────── */
var expBlob = null, expName = "", expUrl = null;
function openExport(canvas, filename){
  canvas.toBlob(function(blob){
    expBlob = blob; expName = filename;
    if(expUrl) URL.revokeObjectURL(expUrl);
    expUrl = URL.createObjectURL(blob);
    $("expImg").src = expUrl;
    $("expModal").classList.add("on");
  }, "image/jpeg", 0.92);
}
cv.addEventListener("contextmenu", function(e){ e.preventDefault(); });
$("btnCloseExp").onclick = function(){ $("expModal").classList.remove("on"); };
$("btnDownload").onclick = function(){
  if(!expBlob) return;
  var a = document.createElement("a");
  a.href = URL.createObjectURL(expBlob); a.download = expName;
  document.body.appendChild(a); a.click(); a.remove();
};
$("btnShare").onclick = function(){
  if(!expBlob) return;
  var file = new File([expBlob], expName, { type:"image/jpeg" });
  if(navigator.canShare && navigator.canShare({ files:[file] })){
    navigator.share({ files:[file], title:expName }).catch(function(){});
  }else{
    alert("此瀏覽器不支援分享，請改用「下載檔案」或長按預覽圖儲存。");
    $("btnDownload").click();
  }
};

/* ───────── 視窗尺寸 ───────── */
window.addEventListener("resize", function(){
  if(views.edit.classList.contains("on")) draw();
});

renderLib();
